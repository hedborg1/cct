<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="#1a1a2e"/>

  <!-- Subtle inner glow -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#glow)" clip-path="url(#rounded)"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e8913e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e8913e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Chevron > -->
  <path d="M 280 340 L 460 512 L 280 684"
        fill="none"
        stroke="#e8913e"
        stroke-width="72"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Cursor _ -->
  <line x1="520" y1="684" x2="740" y2="684"
        stroke="#e8913e"
        stroke-width="72"
        stroke-linecap="round"/>
</svg>
